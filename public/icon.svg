<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Flat colours only — ImageMagick's SVG renderer drops gradients to
       black on raster. Full-bleed background matching app's theme_color
       #4f46e5 (indigo-600). OS adds the corner mask on install. -->

  <!-- full-bleed indigo background -->
  <rect width="512" height="512" fill="#4f46e5"/>

  <!-- dumbbell: bar -->
  <rect x="80" y="240" width="352" height="32" rx="8" fill="#ffffff"/>

  <!-- inner discs -->
  <rect x="100" y="208" width="44" height="96" rx="10" fill="#ffffff"/>
  <rect x="368" y="208" width="44" height="96" rx="10" fill="#ffffff"/>

  <!-- outer weight ends -->
  <rect x="48"  y="184" width="56" height="144" rx="14" fill="#ffffff"/>
  <rect x="408" y="184" width="56" height="144" rx="14" fill="#ffffff"/>

  <!-- subtle inner-shadow strokes (darker indigo) to give depth -->
  <g stroke="#2d2a8a" stroke-width="4" fill="none">
    <rect x="100" y="208" width="44" height="96" rx="10"/>
    <rect x="368" y="208" width="44" height="96" rx="10"/>
    <rect x="48"  y="184" width="56" height="144" rx="14"/>
    <rect x="408" y="184" width="56" height="144" rx="14"/>
  </g>
</svg>
