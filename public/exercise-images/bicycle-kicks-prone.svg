<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBK" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBK)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bicycle Kicks</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="280" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: prone (face down), head left, legs right -->

  <!-- Torso (lying face down on mat) -->
  <ellipse cx="170" cy="265" rx="60" ry="18" fill="url(#bodyBK)" stroke="#b45309" stroke-width="2"/>

  <!-- Head (propped up on forearms) -->
  <circle cx="95" cy="248" r="22" fill="url(#bodyBK)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="86" cy="244" r="3" fill="#1e293b"/>
  <circle cx="98" cy="244" r="3" fill="#1e293b"/>
  <path d="M86 256 Q92 260 98 256" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Forearm prop -->
  <line x1="130" y1="260" x2="105" y2="278" stroke="url(#bodyBK)" stroke-width="10" stroke-linecap="round"/>
  <line x1="105" y1="278" x2="88" y2="272" stroke="url(#bodyBK)" stroke-width="10" stroke-linecap="round"/>

  <!-- Hips -->
  <ellipse cx="240" cy="270" rx="22" ry="14" fill="url(#bodyBK)" stroke="#b45309" stroke-width="2"/>

  <!-- Left leg: bicycle motion (thigh + shin as articulated lines) -->
  <!-- Left thigh -->
  <line x1="258" y1="268" x2="298" y2="240" stroke="url(#bodyBK)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y2" values="240;265;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="298;285;298" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left shin -->
  <line x1="298" y1="240" x2="320" y2="215" stroke="url(#bodyBK)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="298;285;298" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="240;265;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="320;310;320" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="215;255;215" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left foot -->
  <ellipse cx="325" cy="212" rx="12" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cy" values="212;252;212" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="325;315;325" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Right leg: opposite phase -->
  <!-- Right thigh -->
  <line x1="255" y1="272" x2="285" y2="265" stroke="url(#bodyBK)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y2" values="265;240;265" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="285;298;285" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right shin -->
  <line x1="285" y1="265" x2="310" y2="255" stroke="url(#bodyBK)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="285;298;285" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="265;240;265" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="310;320;310" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="255;215;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right foot -->
  <ellipse cx="315" cy="252" rx="12" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cy" values="252;212;252" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cx" values="315;325;315" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Circular arrow for pedaling motion -->
  <circle cx="305" cy="235" r="30" stroke="#22d3ee" stroke-width="2" fill="none" stroke-dasharray="20 70" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" values="0 305 235;360 305 235" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Tretbewegung wie Fahrradfahren</text>
</svg>