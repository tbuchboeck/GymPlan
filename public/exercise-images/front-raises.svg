<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgFR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyFR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgFR)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Front Raises</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg: thigh -->
  <line x1="180" y1="260" x2="175" y2="310" stroke="url(#bodyFR)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg: shin -->
  <line x1="175" y1="310" x2="172" y2="342" stroke="url(#bodyFR)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="172" cy="346" rx="16" ry="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Right leg: thigh -->
  <line x1="220" y1="260" x2="225" y2="310" stroke="url(#bodyFR)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg: shin -->
  <line x1="225" y1="310" x2="228" y2="342" stroke="url(#bodyFR)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="228" cy="346" rx="16" ry="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="210" rx="38" ry="55" fill="url(#bodyFR)" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Left arm (full arm, animated front raise) -->
  <!-- Upper arm -->
  <line x1="162" y1="180" x2="140" y2="220" stroke="url(#bodyFR)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="140;120;140" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="220;160;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="140" y1="220" x2="125" y2="265" stroke="url(#bodyFR)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="140;120;140" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="220;160;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="125;95;125" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="265;165;265" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left dumbbell -->
  <rect x="118" y="262" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="118;88;118" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="262;162;262" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Right arm (full arm, animated front raise, offset) -->
  <!-- Upper arm -->
  <line x1="238" y1="180" x2="260" y2="220" stroke="url(#bodyFR)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="260;280;260" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="220;160;220" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="260" y1="220" x2="275" y2="265" stroke="url(#bodyFR)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="260;280;260" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="220;160;220" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="275;305;275" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="265;165;265" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right dumbbell -->
  <rect x="268" y="262" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="268;298;268" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="262;162;262" dur="2.5s" begin="1.25s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Head -->
  <circle cx="200" cy="130" r="24" fill="url(#bodyFR)" stroke="#1d4ed8" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="126" r="3" fill="#1e293b"/>
  <circle cx="208" cy="126" r="3" fill="#1e293b"/>
  <path d="M191 138 Q200 144 209 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme gestreckt nach vorne bis Schulterhöhe</text>
</svg>