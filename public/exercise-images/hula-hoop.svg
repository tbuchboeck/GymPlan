<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgHula" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyHula" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgHula)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Hula Hoop</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg - thigh -->
  <line x1="185" y1="260" x2="178" y2="310" stroke="url(#bodyHula)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg - shin -->
  <line x1="178" y1="310" x2="175" y2="342" stroke="url(#bodyHula)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="175" cy="346" rx="15" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right leg - thigh -->
  <line x1="215" y1="260" x2="222" y2="310" stroke="url(#bodyHula)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg - shin -->
  <line x1="222" y1="310" x2="225" y2="342" stroke="url(#bodyHula)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="225" cy="346" rx="15" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Hula Hoop ring (behind body at bottom, in front at top) -->
  <!-- Back half of hoop -->
  <ellipse cx="200" cy="230" rx="80" ry="22" fill="none" stroke="#ec4899" stroke-width="7" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 200 230" to="360 200 230" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Torso (with hip sway) -->
  <ellipse cx="200" cy="200" rx="34" ry="55" fill="url(#bodyHula)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cx" values="200;206;200;194;200" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Front half of hoop -->
  <ellipse cx="200" cy="230" rx="80" ry="22" fill="none" stroke="#f472b6" stroke-width="7" opacity="0.9" stroke-dasharray="125 126">
    <animateTransform attributeName="transform" type="rotate" from="0 200 230" to="360 200 230" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Head -->
  <circle cx="200" cy="125" r="24" fill="url(#bodyHula)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="121" r="3" fill="#1e293b"/>
  <circle cx="208" cy="121" r="3" fill="#1e293b"/>
  <path d="M192 133 Q200 139 208 133" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left arm raised - upper -->
  <line x1="168" y1="175" x2="130" y2="145" stroke="url(#bodyHula)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="130;125;130;135;130" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left arm - forearm -->
  <line x1="130" y1="145" x2="120" y2="115" stroke="url(#bodyHula)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="130;125;130;135;130" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="120;115;120;125;120" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right arm raised - upper -->
  <line x1="232" y1="175" x2="270" y2="145" stroke="url(#bodyHula)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="270;275;270;265;270" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right arm - forearm -->
  <line x1="270" y1="145" x2="280" y2="115" stroke="url(#bodyHula)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="270;275;270;265;270" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="280;285;280;275;280" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Hula Hoop kreisen lassen, Huefte locker bewegen</text>
</svg>