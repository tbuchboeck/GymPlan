<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgPL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyPL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgPL)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bauchlage-Beinheben</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="280" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: prone (face down), head left, legs right -->

  <!-- Torso (lying face down on mat) -->
  <ellipse cx="170" cy="265" rx="60" ry="18" fill="url(#bodyPL)" stroke="#b45309" stroke-width="2"/>

  <!-- Head (face down, propped on forearms) -->
  <circle cx="95" cy="248" r="22" fill="url(#bodyPL)" stroke="#b45309" stroke-width="2"/>
  <!-- Face (looking down/forward) -->
  <circle cx="86" cy="244" r="3" fill="#1e293b"/>
  <circle cx="98" cy="244" r="3" fill="#1e293b"/>
  <path d="M86 256 Q92 260 98 256" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Forearm prop (arms bent, forearms on mat) -->
  <line x1="130" y1="260" x2="105" y2="278" stroke="url(#bodyPL)" stroke-width="10" stroke-linecap="round"/>
  <line x1="105" y1="278" x2="88" y2="272" stroke="url(#bodyPL)" stroke-width="10" stroke-linecap="round"/>

  <!-- Hips on mat -->
  <ellipse cx="240" cy="270" rx="22" ry="14" fill="url(#bodyPL)" stroke="#b45309" stroke-width="2"/>

  <!-- Thigh (both legs lifting together) -->
  <line x1="258" y1="272" x2="308" y2="255" stroke="url(#bodyPL)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y2" values="255;220;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Shin -->
  <line x1="308" y1="255" x2="345" y2="248" stroke="url(#bodyPL)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y1" values="255;220;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="248;210;248" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Foot -->
  <ellipse cx="350" cy="245" rx="14" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cy" values="245;207;245" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Arrow showing upward leg lift -->
  <g opacity="0.7">
    <path d="M355 200 L355 160" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M349 167 L355 155 L361 167" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Beide Beine gestreckt vom Boden abheben</text>
</svg>