<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgPLL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyPLL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgPLL)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bauchlage-Beinheben</text>

  <!-- Mat -->
  <rect x="40" y="290" width="320" height="10" rx="5" fill="#475569"/>

  <!-- Head facing down/forward -->
  <circle cx="100" cy="230" r="22" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2"/>
  <circle cx="90" cy="226" r="3" fill="#1e293b"/>

  <!-- Upper arms (propped on forearms) -->
  <rect x="95" y="250" width="14" height="42" rx="7" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2" transform="rotate(-15 102 270)"/>
  <rect x="120" y="255" width="14" height="38" rx="7" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2" transform="rotate(10 127 270)"/>

  <!-- Torso (prone position, slightly elevated front) -->
  <ellipse cx="200" cy="270" rx="75" ry="22" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2"/>

  <!-- Hips -->
  <ellipse cx="280" cy="275" rx="22" ry="18" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2"/>

  <!-- Legs (both lifting together) -->
  <rect x="290" y="230" width="16" height="60" rx="8" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="5 298 280;-25 298 280;5 298 280" dur="2s" repeatCount="indefinite"/>
  </rect>
  <ellipse cx="298" cy="230" rx="10" ry="8" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="5 298 280;-25 298 280;5 298 280" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <rect x="305" y="230" width="16" height="60" rx="8" fill="url(#bodyPLL)" stroke="#b45309" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="5 313 280;-25 313 280;5 313 280" dur="2s" repeatCount="indefinite"/>
  </rect>
  <ellipse cx="313" cy="230" rx="10" ry="8" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="5 313 280;-25 313 280;5 313 280" dur="2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Arrow showing upward leg movement -->
  <path d="M 330 200 L 330 160 L 320 170 M 330 160 L 340 170" stroke="#22d3ee" stroke-width="3" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="345" font-family="system-ui" font-size="14" fill="#94a3b8" text-anchor="middle">Beide Beine gestreckt anheben</text>
</svg>