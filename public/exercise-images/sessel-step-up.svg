<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgStep" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyStep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgStep)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Sessel Step-Up</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Box/Chair -->
  <rect x="210" y="285" width="90" height="60" rx="4" fill="#475569" stroke="#64748b" stroke-width="2"/>
  <rect x="215" y="280" width="80" height="10" rx="3" fill="#64748b"/>

  <!-- Standing leg (left, on ground) - thigh -->
  <line x1="165" y1="220" x2="150" y2="290" stroke="url(#bodyStep)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y1" values="220;195;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Standing leg - shin -->
  <line x1="150" y1="290" x2="148" y2="342" stroke="url(#bodyStep)" stroke-width="14" stroke-linecap="round"/>
  <!-- Standing foot -->
  <ellipse cx="150" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>

  <!-- Stepping leg (right, on box) - thigh -->
  <line x1="185" y1="220" x2="235" y2="255" stroke="url(#bodyStep)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y1" values="220;195;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="255;240;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Stepping leg - shin -->
  <line x1="235" y1="255" x2="245" y2="275" stroke="url(#bodyStep)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y1" values="255;240;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Stepping foot on box -->
  <ellipse cx="248" cy="278" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="175" cy="170" rx="36" ry="50" fill="url(#bodyStep)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="170;145;170" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Head -->
  <circle cx="175" cy="98" r="24" fill="url(#bodyStep)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="98;73;98" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="167" cy="94" r="3" fill="#1e293b">
    <animate attributeName="cy" values="94;69;94" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="183" cy="94" r="3" fill="#1e293b">
    <animate attributeName="cy" values="94;69;94" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M167 106 Q175 112 183 106" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M167 106 Q175 112 183 106;M167 81 Q175 87 183 81;M167 106 Q175 112 183 106" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Left arm - upper -->
  <line x1="143" y1="155" x2="115" y2="135" stroke="url(#bodyStep)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;130;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="135;110;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left arm - forearm -->
  <line x1="115" y1="135" x2="110" y2="160" stroke="url(#bodyStep)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="y1" values="135;110;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="160;135;160" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right arm - upper -->
  <line x1="207" y1="155" x2="235" y2="135" stroke="url(#bodyStep)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;130;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="135;110;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right arm - forearm -->
  <line x1="235" y1="135" x2="240" y2="160" stroke="url(#bodyStep)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="y1" values="135;110;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="160;135;160" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Up arrow -->
  <path d="M330 220 L330 180" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M324 190 L330 178 L336 190" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Auf Sessel steigen, abwechselnd pro Seite</text>
</svg>