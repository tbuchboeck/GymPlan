<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgKB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyKB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgKB)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Kniebeugen</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left foot -->
  <ellipse cx="168" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>
  <!-- Right foot -->
  <ellipse cx="232" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>

  <!-- Left leg: shin (fixed bottom, knee moves forward in squat) -->
  <line x1="168" y1="342" x2="165" y2="295" stroke="url(#bodyKB)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="165;158;165" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="295;310;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left leg: thigh (knee to hip) -->
  <line x1="165" y1="295" x2="180" y2="245" stroke="url(#bodyKB)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="165;158;165" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="295;310;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="245;285;245" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right leg: shin -->
  <line x1="232" y1="342" x2="235" y2="295" stroke="url(#bodyKB)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="235;242;235" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="295;310;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right leg: thigh -->
  <line x1="235" y1="295" x2="220" y2="245" stroke="url(#bodyKB)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="235;242;235" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="295;310;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="245;285;245" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Torso (moves up/down with squat) -->
  <ellipse cx="200" cy="195" rx="38" ry="55" fill="url(#bodyKB)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="195;235;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Left arm stretched forward (balance) -->
  <!-- Upper arm -->
  <line x1="162" y1="175" x2="120" y2="168" stroke="url(#bodyKB)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="175;215;175" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="168;208;168" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="120" y1="168" x2="90" y2="165" stroke="url(#bodyKB)" stroke-width="8" stroke-linecap="round">
    <animate attributeName="y1" values="168;208;168" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="165;205;165" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right arm stretched forward -->
  <!-- Upper arm -->
  <line x1="238" y1="175" x2="280" y2="168" stroke="url(#bodyKB)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="175;215;175" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="168;208;168" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="280" y1="168" x2="310" y2="165" stroke="url(#bodyKB)" stroke-width="8" stroke-linecap="round">
    <animate attributeName="y1" values="168;208;168" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="165;205;165" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head (moves with body) -->
  <circle cx="200" cy="118" r="24" fill="url(#bodyKB)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="118;158;118" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="192" cy="114" r="3" fill="#1e293b">
    <animate attributeName="cy" values="114;154;114" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="114" r="3" fill="#1e293b">
    <animate attributeName="cy" values="114;154;114" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M191 126 Q200 132 209 126" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M191 126 Q200 132 209 126;M191 166 Q200 172 209 166;M191 126 Q200 132 209 126" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Knie nicht über die Zehenspitzen schieben</text>
</svg>