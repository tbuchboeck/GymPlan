<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBS)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Brustpresse sitzend</text>

  <!-- Machine frame -->
  <rect x="65" y="90" width="22" height="210" rx="5" fill="#475569"/>
  <rect x="55" y="80" width="42" height="18" rx="5" fill="#64748b"/>

  <!-- Pulley -->
  <circle cx="76" cy="120" r="10" fill="#64748b" stroke="#334155" stroke-width="2"/>

  <!-- Weight stack -->
  <rect x="50" y="190" width="22" height="80" rx="3" fill="#64748b" stroke="#334155" stroke-width="1.5">
    <animate attributeName="y" values="190;170;190" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Back rest -->
  <rect x="120" y="125" width="15" height="110" rx="5" fill="#475569"/>

  <!-- Lever arm -->
  <line x1="76" y1="120" x2="180" y2="165" stroke="#64748b" stroke-width="4"/>

  <!-- Push handles (animated) -->
  <line x1="180" y1="155" x2="240" y2="155" stroke="#475569" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="240;295;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="180" y1="180" x2="240" y2="180" stroke="#475569" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="240;295;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Seat -->
  <rect x="115" y="250" width="80" height="15" rx="6" fill="#475569"/>
  <!-- Seat support -->
  <rect x="145" y="265" width="20" height="40" rx="4" fill="#475569"/>
  <rect x="120" y="305" width="65" height="8" rx="4" fill="#64748b"/>

  <!-- Ground line -->
  <line x1="40" y1="350" x2="350" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs (seated) -->
  <!-- Left thigh -->
  <line x1="155" y1="255" x2="195" y2="305" stroke="url(#bodyBS)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="195" y1="305" x2="190" y2="345" stroke="url(#bodyBS)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="195" cy="346" rx="16" ry="6" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>

  <!-- Right thigh -->
  <line x1="175" y1="255" x2="215" y2="305" stroke="url(#bodyBS)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="215" y1="305" x2="210" y2="345" stroke="url(#bodyBS)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="215" cy="346" rx="16" ry="6" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>

  <!-- Torso (against backrest) -->
  <ellipse cx="155" cy="195" rx="35" ry="55" fill="url(#bodyBS)" stroke="#c2410c" stroke-width="2"/>

  <!-- Left upper arm (pushing forward) -->
  <line x1="180" y1="170" x2="220" y2="155" stroke="url(#bodyBS)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="220;260;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="220" y1="155" x2="240" y2="155" stroke="url(#bodyBS)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="220;260;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="240;295;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right upper arm -->
  <line x1="180" y1="195" x2="220" y2="180" stroke="url(#bodyBS)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="220;260;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="220" y1="180" x2="240" y2="180" stroke="url(#bodyBS)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="220;260;220" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="240;295;240" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="155" cy="118" r="24" fill="url(#bodyBS)" stroke="#c2410c" stroke-width="2"/>
  <!-- Face -->
  <circle cx="147" cy="114" r="3" fill="#1e293b"/>
  <circle cx="163" cy="114" r="3" fill="#1e293b"/>
  <path d="M146 124 Q155 130 164 124" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Push arrow -->
  <path d="M290 330 L330 330" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M324 325 L334 330 L324 335" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme kontrolliert nach vorne drücken</text>
</svg>