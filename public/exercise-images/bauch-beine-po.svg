<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBBP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBBP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBBP)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bauch Beine Po</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left hand on ground -->
  <ellipse cx="108" cy="346" rx="12" ry="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>
  <!-- Right hand on ground -->
  <ellipse cx="158" cy="346" rx="12" ry="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Left arm (supporting) -->
  <line x1="108" y1="340" x2="120" y2="270" stroke="url(#bodyBBP)" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm (supporting) -->
  <line x1="158" y1="340" x2="145" y2="270" stroke="url(#bodyBBP)" stroke-width="10" stroke-linecap="round"/>

  <!-- Torso (all-fours, angled) -->
  <ellipse cx="200" cy="255" rx="65" ry="25" fill="url(#bodyBBP)" stroke="#6d28d9" stroke-width="2"/>

  <!-- Head (looking down) -->
  <circle cx="105" cy="250" r="22" fill="url(#bodyBBP)" stroke="#6d28d9" stroke-width="2"/>
  <!-- Face -->
  <circle cx="97" cy="246" r="2.5" fill="#1e293b"/>
  <circle cx="110" cy="246" r="2.5" fill="#1e293b"/>
  <path d="M97 257 Q105 262 113 257" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left leg (stable, kneeling) - thigh -->
  <line x1="240" y1="265" x2="240" y2="310" stroke="url(#bodyBBP)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg - shin (on ground) -->
  <line x1="240" y1="310" x2="240" y2="346" stroke="url(#bodyBBP)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left knee -->
  <ellipse cx="240" cy="346" rx="10" ry="5" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Right leg (kicking) - thigh -->
  <line x1="270" y1="258" x2="310" y2="280" stroke="url(#bodyBBP)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y2" values="280;200;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="310;300;310" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right leg - shin -->
  <line x1="310" y1="280" x2="340" y2="310" stroke="url(#bodyBBP)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="310;300;310" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="280;200;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="340;330;340" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="310;190;310" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right foot -->
  <ellipse cx="342" cy="312" rx="12" ry="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5">
    <animate attributeName="cx" values="342;332;342" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="312;188;312" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Motion arrow -->
  <path d="M350 260 L350 210" stroke="#22d3ee" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Donkey Kicks - Bein kontrolliert nach oben strecken</text>
</svg>