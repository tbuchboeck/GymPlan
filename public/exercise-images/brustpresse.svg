<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBP)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Brustpresse</text>

  <!-- Machine seat back -->
  <rect x="175" y="120" width="18" height="130" rx="6" fill="#475569"/>
  <!-- Machine seat bottom -->
  <rect x="160" y="248" width="80" height="14" rx="6" fill="#475569"/>
  <!-- Machine base -->
  <rect x="170" y="262" width="60" height="8" rx="4" fill="#64748b"/>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs (seated, bent at knee) -->
  <!-- Left thigh -->
  <line x1="195" y1="250" x2="230" y2="300" stroke="url(#bodyBP)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="230" y1="300" x2="218" y2="342" stroke="url(#bodyBP)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right thigh -->
  <line x1="210" y1="250" x2="245" y2="300" stroke="url(#bodyBP)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="245" y1="300" x2="233" y2="342" stroke="url(#bodyBP)" stroke-width="12" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="215" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>
  <ellipse cx="232" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5"/>

  <!-- Torso (seated upright against backrest) -->
  <ellipse cx="210" cy="185" rx="38" ry="55" fill="url(#bodyBP)" stroke="#be185d" stroke-width="2"/>

  <!-- Left upper arm (fixed, at shoulder) -->
  <line x1="172" y1="155" x2="130" y2="185" stroke="url(#bodyBP)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left forearm (pushing forward) -->
  <line x1="130" y1="185" x2="90" y2="180" stroke="url(#bodyBP)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="90;60;90" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left hand -->
  <circle cx="90" cy="180" r="7" fill="url(#bodyBP)" stroke="#be185d" stroke-width="1.5">
    <animate attributeName="cx" values="90;60;90" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Right upper arm -->
  <line x1="248" y1="155" x2="290" y2="185" stroke="url(#bodyBP)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right forearm (pushing forward) -->
  <line x1="290" y1="185" x2="330" y2="180" stroke="url(#bodyBP)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="330;360;330" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right hand -->
  <circle cx="330" cy="180" r="7" fill="url(#bodyBP)" stroke="#be185d" stroke-width="1.5">
    <animate attributeName="cx" values="330;360;330" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Machine handles/bars -->
  <rect x="78" y="170" width="10" height="24" rx="4" fill="#64748b">
    <animate attributeName="x" values="78;48;78" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <rect x="332" y="170" width="10" height="24" rx="4" fill="#64748b">
    <animate attributeName="x" values="332;362;332" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Head -->
  <circle cx="210" cy="110" r="26" fill="url(#bodyBP)" stroke="#be185d" stroke-width="2"/>

  <!-- Face details -->
  <circle cx="202" cy="106" r="3" fill="#1e293b"/>
  <circle cx="218" cy="106" r="3" fill="#1e293b"/>
  <path d="M200 118 Q210 124 220 118" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Push direction arrows -->
  <g opacity="0.7">
    <path d="M90 230 L60 230" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M66 225 L56 230 L66 235" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M330 230 L360 230" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M354 225 L364 230 L354 235" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme kontrolliert nach vorne drücken</text>
</svg>