<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLauf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyLauf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgLauf)"/>
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Laufband</text>

  <!-- Treadmill -->
  <rect x="90" y="295" width="220" height="35" rx="5" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
  <rect x="100" y="280" width="200" height="20" rx="3" fill="#64748b"/>
  <rect x="80" y="170" width="8" height="130" rx="4" fill="#64748b"/>
  <rect x="312" y="170" width="8" height="130" rx="4" fill="#64748b"/>
  <line x1="84" y1="170" x2="160" y2="170" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <line x1="240" y1="170" x2="316" y2="170" stroke="#64748b" stroke-width="6" stroke-linecap="round"/>
  <rect x="165" y="130" width="70" height="45" rx="4" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <circle cx="185" cy="148" r="4" fill="#10b981">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="215" cy="148" r="4" fill="#ef4444"/>
  <rect x="196" y="160" width="8" height="20" rx="2" fill="#64748b"/>
  <rect x="105" y="330" width="8" height="20" rx="2" fill="#475569"/>
  <rect x="287" y="330" width="8" height="20" rx="2" fill="#475569"/>
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="200" cy="80" r="22" fill="url(#bodyLauf)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cy" values="80;76;80" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="192" cy="76" r="2.5" fill="#1e293b">
    <animate attributeName="cy" values="76;72;76" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="76" r="2.5" fill="#1e293b">
    <animate attributeName="cy" values="76;72;76" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M192 88 Q200 93 208 88" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M192 88 Q200 93 208 88;M192 84 Q200 89 208 84;M192 88 Q200 93 208 88" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Torso -->
  <ellipse cx="200" cy="145" rx="32" ry="42" fill="url(#bodyLauf)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cy" values="145;141;145" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Left arm -->
  <line x1="172" y1="128" x2="148" y2="155" stroke="url(#bodyLauf)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="148;162;148" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="148" y1="155" x2="155" y2="175" stroke="url(#bodyLauf)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="148;162;148" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="155;168;155" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right arm -->
  <line x1="228" y1="128" x2="252" y2="155" stroke="url(#bodyLauf)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="252;238;252" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="252" y1="155" x2="245" y2="175" stroke="url(#bodyLauf)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="252;238;252" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="245;232;245" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Left leg -->
  <line x1="185" y1="185" x2="160" y2="235" stroke="url(#bodyLauf)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x2" values="160;180;160" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="160" y1="235" x2="155" y2="276" stroke="url(#bodyLauf)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="160;180;160" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="155;175;155" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <ellipse cx="155" cy="278" rx="14" ry="5" fill="#0891b2" stroke="#0e7490" stroke-width="1.5">
    <animate attributeName="cx" values="155;175;155" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <!-- Right leg -->
  <line x1="215" y1="185" x2="240" y2="235" stroke="url(#bodyLauf)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x2" values="240;220;240" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="240" y1="235" x2="245" y2="276" stroke="url(#bodyLauf)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="240;220;240" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="245;225;245" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <ellipse cx="245" cy="278" rx="14" ry="5" fill="#0891b2" stroke="#0e7490" stroke-width="1.5">
    <animate attributeName="cx" values="245;225;245" dur="0.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Gleichmaessiges Laufen auf dem Laufband</text>
</svg>