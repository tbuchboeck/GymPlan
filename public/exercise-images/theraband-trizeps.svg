<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgTBT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyTBT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgTBT)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Theraband Trizeps</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg: thigh -->
  <line x1="180" y1="260" x2="175" y2="310" stroke="url(#bodyTBT)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg: shin -->
  <line x1="175" y1="310" x2="172" y2="342" stroke="url(#bodyTBT)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="172" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right leg: thigh -->
  <line x1="220" y1="260" x2="225" y2="310" stroke="url(#bodyTBT)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg: shin -->
  <line x1="225" y1="310" x2="228" y2="342" stroke="url(#bodyTBT)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="228" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="210" rx="38" ry="55" fill="url(#bodyTBT)" stroke="#b45309" stroke-width="2"/>

  <!-- Theraband (from lower left hand behind back to upper right hand) -->
  <line x1="155" y1="240" x2="215" y2="80" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <animate attributeName="x2" values="215;225;215" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="80;60;80" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Left arm (holding band at lower back, fixed) -->
  <!-- Upper arm -->
  <line x1="165" y1="185" x2="155" y2="220" stroke="url(#bodyTBT)" stroke-width="12" stroke-linecap="round"/>
  <!-- Forearm -->
  <line x1="155" y1="220" x2="155" y2="240" stroke="url(#bodyTBT)" stroke-width="10" stroke-linecap="round"/>

  <!-- Right arm (overhead extension, animated) -->
  <!-- Upper arm (raised) -->
  <line x1="225" y1="170" x2="220" y2="115" stroke="url(#bodyTBT)" stroke-width="12" stroke-linecap="round"/>
  <!-- Forearm (animated extension) -->
  <line x1="220" y1="115" x2="210" y2="145" stroke="url(#bodyTBT)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="210;225;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="145;65;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Movement arrow -->
  <g opacity="0.6">
    <line x1="250" y1="100" x2="250" y2="70" stroke="#22d3ee" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </line>
    <path d="M245 76 L250 66 L255 76" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
  </g>

  <!-- Head -->
  <circle cx="200" cy="130" r="24" fill="url(#bodyTBT)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="126" r="3" fill="#1e293b"/>
  <circle cx="208" cy="126" r="3" fill="#1e293b"/>
  <path d="M191 138 Q200 144 209 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Ellbogen fixiert, Unterarm nach oben strecken</text>
</svg>