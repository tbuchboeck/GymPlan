<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyRC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgRC)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Reverse Crunch</text>

  <!-- Mat -->
  <rect x="50" y="300" width="300" height="10" rx="5" fill="#475569"/>

  <!-- Head -->
  <circle cx="310" cy="268" r="24" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2"/>
  <circle cx="303" cy="263" r="3" fill="#1e293b"/>
  <circle cx="318" cy="263" r="3" fill="#1e293b"/>

  <!-- Arms flat on ground -->
  <path d="M 280 285 L 310 298" stroke="url(#bodyRC)" stroke-width="12" fill="none" stroke-linecap="round"/>

  <!-- Torso lying flat -->
  <ellipse cx="230" cy="275" rx="55" ry="25" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2"/>

  <!-- Hips -->
  <ellipse cx="170" cy="278" rx="22" ry="18" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2"/>

  <!-- Upper legs (thighs) - animated pulling knees to chest -->
  <g>
    <rect x="140" y="230" width="22" height="55" rx="11" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 155 278;-40 155 278;20 155 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Lower legs -->
    <rect x="130" y="195" width="18" height="45" rx="9" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 155 278;-40 155 278;20 155 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Foot -->
    <ellipse cx="139" cy="195" rx="10" ry="8" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 155 278;-40 155 278;20 155 278" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Second leg -->
  <g>
    <rect x="158" y="230" width="22" height="55" rx="11" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 170 278;-40 170 278;20 170 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="148" y="195" width="18" height="45" rx="9" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 170 278;-40 170 278;20 170 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="157" cy="195" rx="10" ry="8" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="20 170 278;-40 170 278;20 170 278" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Arrow showing knee movement -->
  <path d="M 110 170 Q 130 130 170 150" stroke="#22d3ee" stroke-width="3" fill="none" marker-end="url(#arrowRC)">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="355" font-family="system-ui" font-size="14" fill="#94a3b8" text-anchor="middle">Knie kontrolliert zur Brust ziehen</text>
</svg>