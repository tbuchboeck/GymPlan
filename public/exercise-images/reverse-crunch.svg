<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyRC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgRC)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Reverse Crunch</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="290" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: head right, hips left, lying on back -->

  <!-- Torso (lying flat on mat) -->
  <ellipse cx="240" cy="275" rx="55" ry="18" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2"/>

  <!-- Head -->
  <circle cx="310" cy="272" r="22" fill="url(#bodyRC)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="303" cy="268" r="3" fill="#1e293b"/>
  <circle cx="317" cy="268" r="3" fill="#1e293b"/>
  <path d="M302 280 Q310 285 318 280" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Arms flat on ground -->
  <line x1="270" y1="280" x2="305" y2="290" stroke="url(#bodyRC)" stroke-width="10" stroke-linecap="round"/>

  <!-- Thigh (both knees pulling to chest) -->
  <line x1="185" y1="278" x2="155" y2="235" stroke="url(#bodyRC)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y2" values="260;190;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Shin (bent, tucked) -->
  <line x1="155" y1="235" x2="175" y2="265" stroke="url(#bodyRC)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="260;190;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="175;210;175" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="285;215;285" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Foot -->
  <ellipse cx="180" cy="265" rx="14" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cx" values="180;215;180" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="285;212;285" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Arrow showing knee-to-chest pull -->
  <g opacity="0.7">
    <path d="M130 220 Q155 180 190 185" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M184 179 L194 183 L188 192" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Knie kontrolliert zur Brust ziehen</text>
</svg>