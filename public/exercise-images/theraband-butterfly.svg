<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgTBF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyTBF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgTBF)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Theraband Butterfly</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Theraband behind back (stretches with arms) -->
  <line x1="85" y1="195" x2="315" y2="195" stroke="#10b981" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <animate attributeName="x1" values="85;180;85" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="315;220;315" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="195;170;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;170;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Left leg: thigh -->
  <line x1="180" y1="260" x2="175" y2="310" stroke="url(#bodyTBF)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg: shin -->
  <line x1="175" y1="310" x2="172" y2="342" stroke="url(#bodyTBF)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="172" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right leg: thigh -->
  <line x1="220" y1="260" x2="225" y2="310" stroke="url(#bodyTBF)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg: shin -->
  <line x1="225" y1="310" x2="228" y2="342" stroke="url(#bodyTBF)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="228" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="210" rx="38" ry="55" fill="url(#bodyTBF)" stroke="#b45309" stroke-width="2"/>

  <!-- Left upper arm (animated butterfly) -->
  <line x1="162" y1="180" x2="105" y2="195" stroke="url(#bodyTBF)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="105;175;105" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="105" y1="195" x2="85" y2="195" stroke="url(#bodyTBF)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="105;175;105" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="85;180;85" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;170;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right upper arm (animated butterfly) -->
  <line x1="238" y1="180" x2="295" y2="195" stroke="url(#bodyTBF)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="295;225;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="295" y1="195" x2="315" y2="195" stroke="url(#bodyTBF)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="295;225;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="315;220;315" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;170;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="200" cy="130" r="24" fill="url(#bodyTBF)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="126" r="3" fill="#1e293b"/>
  <circle cx="208" cy="126" r="3" fill="#1e293b"/>
  <path d="M191 138 Q200 144 209 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Theraband hinter dem Rücken spannen</text>
</svg>