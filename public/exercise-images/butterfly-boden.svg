<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBB)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Butterfly am Boden</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="50" y="280" width="300" height="12" rx="6" fill="#475569"/>

  <!-- Side view: head left, feet right, person lying on back -->

  <!-- Feet (on right, knees bent) -->
  <ellipse cx="310" cy="282" rx="14" ry="6" fill="#e11d48" stroke="#be123c" stroke-width="1.5"/>

  <!-- Shin (bent upward from foot to knee) -->
  <line x1="310" y1="278" x2="285" y2="230" stroke="url(#bodyBB)" stroke-width="13" stroke-linecap="round"/>

  <!-- Thigh (from knee back toward hip) -->
  <line x1="285" y1="230" x2="230" y2="265" stroke="url(#bodyBB)" stroke-width="15" stroke-linecap="round"/>

  <!-- Torso (lying flat on mat) -->
  <ellipse cx="170" cy="262" rx="55" ry="22" fill="url(#bodyBB)" stroke="#be123c" stroke-width="2"/>

  <!-- Head (left side, on mat) -->
  <circle cx="100" cy="252" r="22" fill="url(#bodyBB)" stroke="#be123c" stroke-width="2"/>

  <!-- Face (looking up/left) -->
  <circle cx="93" cy="248" r="3" fill="#1e293b"/>
  <circle cx="107" cy="248" r="3" fill="#1e293b"/>
  <path d="M92 259 Q100 264 108 259" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Left arm (near side, sweeps from spread down to above chest) -->
  <!-- Upper arm -->
  <line x1="155" y1="250" x2="130" y2="210" stroke="url(#bodyBB)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="130;155;130" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="210;195;210" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="130" y1="210" x2="110" y2="190" stroke="url(#bodyBB)" stroke-width="8" stroke-linecap="round">
    <animate attributeName="x1" values="130;155;130" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="210;195;210" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="110;165;110" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="190;170;190" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left dumbbell -->
  <rect x="103" y="187" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="103;158;103" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="187;167;187" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Right arm (far side, sweeps from spread down to above chest) -->
  <!-- Upper arm -->
  <line x1="185" y1="258" x2="210" y2="310" stroke="url(#bodyBB)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="210;175;210" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="310;210;310" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="210" y1="310" x2="230" y2="320" stroke="url(#bodyBB)" stroke-width="8" stroke-linecap="round">
    <animate attributeName="x1" values="210;175;210" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="310;210;310" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="230;170;230" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="320;185;320" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right dumbbell -->
  <rect x="223" y="317" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="223;163;223" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="317;182;317" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Arc arrows showing sweep motion -->
  <g opacity="0.7">
    <path d="M95 175 Q130 140 170 160" stroke="#fb7185" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M164 164 L175 155 L170 168" stroke="#fb7185" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Liegend, Arme seitlich zusammenführen</text>
</svg>