<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBP" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBP)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Beinpresse</text>

  <!-- Machine frame -->
  <rect x="55" y="140" width="25" height="140" rx="8" fill="#475569"/>
  <!-- Seat bottom -->
  <rect x="55" y="250" width="100" height="18" rx="8" fill="#475569"/>
  <!-- Seat support -->
  <rect x="95" y="268" width="20" height="40" rx="4" fill="#475569"/>
  <rect x="70" y="308" width="70" height="8" rx="4" fill="#64748b"/>

  <!-- Leg press platform (moving) -->
  <rect x="250" y="170" width="25" height="120" rx="8" fill="#64748b">
    <animate attributeName="x" values="250;310;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>
  <!-- Weight stack -->
  <rect x="280" y="190" width="18" height="80" rx="3" fill="#475569">
    <animate attributeName="x" values="280;340;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Ground line -->
  <line x1="40" y1="350" x2="360" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="90" cy="160" r="22" fill="url(#bodyBP)" stroke="#b91c1c" stroke-width="2"/>
  <!-- Face -->
  <circle cx="83" cy="157" r="3" fill="#1e293b"/>
  <circle cx="97" cy="157" r="3" fill="#1e293b"/>
  <path d="M83 167 Q90 172 97 167" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Torso -->
  <ellipse cx="100" cy="210" rx="35" ry="45" fill="url(#bodyBP)" stroke="#b91c1c" stroke-width="2"/>

  <!-- Arms resting on seat handles -->
  <line x1="70" y1="195" x2="55" y2="230" stroke="url(#bodyBP)" stroke-width="10" stroke-linecap="round"/>
  <line x1="130" y1="195" x2="145" y2="230" stroke="url(#bodyBP)" stroke-width="10" stroke-linecap="round"/>

  <!-- Left thigh (horizontal, pushing) -->
  <line x1="125" y1="235" x2="200" y2="220" stroke="url(#bodyBP)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="200;240;200" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left shin -->
  <line x1="200" y1="220" x2="250" y2="200" stroke="url(#bodyBP)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="200;240;200" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="250;310;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left foot -->
  <ellipse cx="252" cy="196" rx="10" ry="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5">
    <animate attributeName="cx" values="252;312;252" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Right thigh -->
  <line x1="125" y1="255" x2="200" y2="270" stroke="url(#bodyBP)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="200;240;200" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right shin -->
  <line x1="200" y1="270" x2="250" y2="290" stroke="url(#bodyBP)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="200;240;200" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="250;310;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right foot -->
  <ellipse cx="252" cy="294" rx="10" ry="14" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5">
    <animate attributeName="cx" values="252;312;252" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Push arrow -->
  <path d="M290 330 L330 330" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M324 325 L334 330 L324 335" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Beine kontrolliert nach vorne drücken</text>
</svg>