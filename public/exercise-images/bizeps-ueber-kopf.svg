<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBuk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBuk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBuk)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Bizeps + Überkopfdrücken</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg: thigh -->
  <line x1="180" y1="260" x2="175" y2="310" stroke="url(#bodyBuk)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg: shin -->
  <line x1="175" y1="310" x2="172" y2="342" stroke="url(#bodyBuk)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="172" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right leg: thigh -->
  <line x1="220" y1="260" x2="225" y2="310" stroke="url(#bodyBuk)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg: shin -->
  <line x1="225" y1="310" x2="228" y2="342" stroke="url(#bodyBuk)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="228" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="210" rx="38" ry="55" fill="url(#bodyBuk)" stroke="#b45309" stroke-width="2"/>

  <!-- Left upper arm (animated: side -> curl -> overhead) -->
  <line x1="162" y1="175" stroke="url(#bodyBuk)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="155;155;162;155" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="225;225;160;225" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm (animated: down -> curled -> overhead -> down) -->
  <line stroke="url(#bodyBuk)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="155;155;162;155" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="225;225;160;225" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="150;165;158;150" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="275;185;90;275" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left dumbbell -->
  <rect width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="143;158;151;143" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="272;182;87;272" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Right upper arm (animated: side -> curl -> overhead) -->
  <line x1="238" y1="175" stroke="url(#bodyBuk)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="245;245;238;245" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="225;225;160;225" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm (animated: down -> curled -> overhead -> down) -->
  <line stroke="url(#bodyBuk)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="245;245;238;245" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="225;225;160;225" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="250;235;242;250" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="275;185;90;275" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right dumbbell -->
  <rect width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="243;228;235;243" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="272;182;87;272" dur="3.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Head -->
  <circle cx="200" cy="130" r="24" fill="url(#bodyBuk)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="126" r="3" fill="#1e293b"/>
  <circle cx="208" cy="126" r="3" fill="#1e293b"/>
  <path d="M191 138 Q200 144 209 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Bizeps Curl + Überkopfdrücken</text>
</svg>