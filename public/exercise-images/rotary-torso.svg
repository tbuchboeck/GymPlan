<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyRT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgRT)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Rotary Torso</text>

  <!-- Machine base -->
  <rect x="110" y="305" width="180" height="15" rx="5" fill="#475569"/>
  <rect x="180" y="320" width="40" height="25" rx="4" fill="#475569"/>
  <!-- Machine back support -->
  <rect x="115" y="140" width="22" height="165" rx="8" fill="#475569"/>

  <!-- Machine side pads -->
  <line x1="155" y1="175" x2="155" y2="260" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="155;148;155;162;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="155;148;155;162;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="245" y1="175" x2="245" y2="260" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="245;252;245;238;245" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="245;252;245;238;245" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Seat -->
  <ellipse cx="200" cy="290" rx="50" ry="14" fill="#475569"/>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Lower body (fixed) -->
  <line x1="180" y1="285" x2="155" y2="320" stroke="url(#bodyRT)" stroke-width="14" stroke-linecap="round"/>
  <line x1="155" y1="320" x2="150" y2="345" stroke="url(#bodyRT)" stroke-width="12" stroke-linecap="round"/>
  <line x1="220" y1="285" x2="245" y2="320" stroke="url(#bodyRT)" stroke-width="14" stroke-linecap="round"/>
  <line x1="245" y1="320" x2="250" y2="345" stroke="url(#bodyRT)" stroke-width="12" stroke-linecap="round"/>

  <!-- Upper body (rotating as group) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="0 200 250;-12 200 250;0 200 250;12 200 250;0 200 250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <ellipse cx="200" cy="215" rx="35" ry="55" fill="url(#bodyRT)" stroke="#b45309" stroke-width="2"/>
    <line x1="172" y1="195" x2="155" y2="245" stroke="url(#bodyRT)" stroke-width="12" stroke-linecap="round"/>
    <line x1="228" y1="195" x2="245" y2="245" stroke="url(#bodyRT)" stroke-width="12" stroke-linecap="round"/>
    <circle cx="200" cy="140" r="24" fill="url(#bodyRT)" stroke="#b45309" stroke-width="2"/>
    <circle cx="192" cy="136" r="3" fill="#1e293b"/>
    <circle cx="208" cy="136" r="3" fill="#1e293b"/>
    <path d="M191 146 Q200 152 209 146" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Rotation arrows -->
  <path d="M285 175 Q310 210 285 245" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.25s" repeatCount="indefinite"/>
  </path>
  <path d="M285 245 L280 235 M285 245 L295 240" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M115 245 Q90 210 115 175" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.25s" repeatCount="indefinite"/>
  </path>
  <path d="M115 175 L120 185 M115 175 L105 180" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Oberkörper kontrolliert rotieren</text>
</svg>