<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBfly" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBfly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBfly)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Butterfly mit Hanteln</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg: thigh -->
  <line x1="180" y1="260" x2="175" y2="310" stroke="url(#bodyBfly)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left leg: shin -->
  <line x1="175" y1="310" x2="172" y2="342" stroke="url(#bodyBfly)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="172" cy="346" rx="16" ry="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Right leg: thigh -->
  <line x1="220" y1="260" x2="225" y2="310" stroke="url(#bodyBfly)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg: shin -->
  <line x1="225" y1="310" x2="228" y2="342" stroke="url(#bodyBfly)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="228" cy="346" rx="16" ry="6" fill="#7c3aed" stroke="#6d28d9" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="210" rx="38" ry="55" fill="url(#bodyBfly)" stroke="#6d28d9" stroke-width="2"/>

  <!-- Left upper arm (animated butterfly open/close) -->
  <line x1="162" y1="180" x2="105" y2="195" stroke="url(#bodyBfly)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="105;175;105" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="105" y1="195" x2="85" y2="175" stroke="url(#bodyBfly)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="105;175;105" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="85;180;85" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="175;145;175" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left dumbbell -->
  <rect x="78" y="172" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="78;173;78" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="172;142;172" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Right upper arm (animated butterfly open/close) -->
  <line x1="238" y1="180" x2="295" y2="195" stroke="url(#bodyBfly)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="295;225;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="295" y1="195" x2="315" y2="175" stroke="url(#bodyBfly)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="295;225;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="195;175;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="315;220;315" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="175;145;175" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right dumbbell -->
  <rect x="308" y="172" width="14" height="6" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="308;213;308" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="172;142;172" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Head -->
  <circle cx="200" cy="130" r="24" fill="url(#bodyBfly)" stroke="#6d28d9" stroke-width="2"/>
  <!-- Face -->
  <circle cx="192" cy="126" r="3" fill="#1e293b"/>
  <circle cx="208" cy="126" r="3" fill="#1e293b"/>
  <path d="M191 138 Q200 144 209 138" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme seitlich anheben, vor Brust zusammenführen</text>
</svg>