<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="body4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bg4)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Schulterpresse</text>

  <!-- Head -->
  <circle cx="200" cy="100" r="25" fill="url(#body4)" stroke="#86198f" stroke-width="2"/>

  <!-- Face details -->
  <circle cx="192" cy="97" r="3" fill="#1e293b"/>
  <circle cx="208" cy="97" r="3" fill="#1e293b"/>
  <path d="M 192 107 Q 200 112 208 107" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body/Torso -->
  <ellipse cx="200" cy="200" rx="50" ry="65" fill="url(#body4)" stroke="#86198f" stroke-width="2"/>

  <!-- Left arm pushing up -->
  <rect x="140" y="110" width="20" height="70" rx="10" fill="url(#body4)" stroke="#86198f" stroke-width="2">
    <animate attributeName="y" values="110;60;110" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="height" values="70;40;70" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Right arm pushing up -->
  <rect x="240" y="110" width="20" height="70" rx="10" fill="url(#body4)" stroke="#86198f" stroke-width="2">
    <animate attributeName="y" values="110;60;110" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="height" values="70;40;70" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Left weight -->
  <rect x="130" y="100" width="25" height="30" rx="5" fill="#64748b" stroke="#334155" stroke-width="2">
    <animate attributeName="y" values="100;50;100" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Right weight -->
  <rect x="245" y="100" width="25" height="30" rx="5" fill="#64748b" stroke="#334155" stroke-width="2">
    <animate attributeName="y" values="100;50;100" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Arrows showing upward push -->
  <path d="M 170 300 L 170 260 L 160 270 M 170 260 L 180 270" stroke="#fbbf24" stroke-width="3" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 230 300 L 230 260 L 220 270 M 230 260 L 240 270" stroke="#fbbf24" stroke-width="3" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </path>
</svg>
