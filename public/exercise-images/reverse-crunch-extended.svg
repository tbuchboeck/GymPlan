<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRCE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyRCE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgRCE)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Reverse Crunch Variante</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="280" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: prone (face down), head left, legs right -->
  <!-- The variant: pull knees in bent, then extend legs straight out -->

  <!-- Torso (face down on mat) -->
  <ellipse cx="170" cy="265" rx="60" ry="18" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>

  <!-- Head (propped on forearms) -->
  <circle cx="95" cy="248" r="22" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="86" cy="244" r="3" fill="#1e293b"/>
  <circle cx="98" cy="244" r="3" fill="#1e293b"/>
  <path d="M86 256 Q92 260 98 256" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Forearm prop -->
  <line x1="130" y1="260" x2="105" y2="278" stroke="url(#bodyRCE)" stroke-width="10" stroke-linecap="round"/>
  <line x1="105" y1="278" x2="88" y2="272" stroke="url(#bodyRCE)" stroke-width="10" stroke-linecap="round"/>

  <!-- Hips -->
  <ellipse cx="240" cy="270" rx="22" ry="14" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>

  <!-- Thigh: pulls in then extends out -->
  <line x1="258" y1="270" x2="300" y2="248" stroke="url(#bodyRCE)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="270;310;270" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="238;255;238" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Shin: bent when pulled in, extended when pushed out -->
  <line x1="300" y1="248" x2="310" y2="230" stroke="url(#bodyRCE)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="270;310;270" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="238;255;238" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="275;355;275" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="262;245;262" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Foot -->
  <ellipse cx="315" cy="228" rx="12" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cx" values="278;360;278" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="260;242;260" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Arrows showing pull-in and extend-out -->
  <g opacity="0.7">
    <!-- Pull in arrow -->
    <path d="M275 195 L258 205" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M264 199 L254 207 L262 211" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </path>
    <!-- Extend out arrow -->
    <path d="M330 195 L350 205" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M344 199 L354 207 L346 211" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Beine anziehen, dann gestreckt absenken</text>
</svg>