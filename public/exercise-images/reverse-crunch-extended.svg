<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgRCE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyRCE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgRCE)"/>

  <!-- Title -->
  <text x="200" y="35" font-family="system-ui" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Reverse Crunch Variante</text>

  <!-- Mat -->
  <rect x="40" y="290" width="320" height="10" rx="5" fill="#475569"/>

  <!-- Head -->
  <circle cx="100" cy="232" r="22" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>
  <circle cx="90" cy="228" r="3" fill="#1e293b"/>

  <!-- Upper arms (propped on forearms) -->
  <rect x="95" y="252" width="14" height="40" rx="7" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2" transform="rotate(-15 102 270)"/>
  <rect x="118" y="256" width="14" height="36" rx="7" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2" transform="rotate(10 125 270)"/>

  <!-- Torso (prone) -->
  <ellipse cx="200" cy="272" rx="75" ry="20" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>

  <!-- Hips -->
  <ellipse cx="280" cy="275" rx="22" ry="18" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2"/>

  <!-- Legs - pull in bent, extend out straight -->
  <!-- Left leg -->
  <g>
    <!-- Thigh -->
    <rect x="288" y="228" width="15" height="52" rx="7" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 295 278;10 295 278;-40 295 278" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Lower leg (extends when pushing out) -->
    <rect x="284" y="200" width="13" height="35" rx="6" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 295 278;10 295 278;-40 295 278" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="290" cy="200" rx="8" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 295 278;10 295 278;-40 295 278" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Right leg -->
  <g>
    <rect x="303" y="228" width="15" height="52" rx="7" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 310 278;10 310 278;-40 310 278" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="299" y="200" width="13" height="35" rx="6" fill="url(#bodyRCE)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 310 278;10 310 278;-40 310 278" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="305" cy="200" rx="8" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-40 310 278;10 310 278;-40 310 278" dur="2.5s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Double arrow showing pull-in / extend-out -->
  <path d="M 260 170 L 240 155 M 260 170 L 250 185" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 340 220 L 355 210 M 340 220 L 345 235" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="345" font-family="system-ui" font-size="13" fill="#94a3b8" text-anchor="middle">Beine anziehen, dann gestreckt absenken</text>
</svg>