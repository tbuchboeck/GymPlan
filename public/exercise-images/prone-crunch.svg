<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyPC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgPC)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bauchlage-Crunch</text>

  <!-- Mat -->
  <rect x="40" y="290" width="320" height="10" rx="5" fill="#475569"/>

  <!-- Head -->
  <circle cx="100" cy="230" r="22" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2"/>
  <circle cx="90" cy="226" r="3" fill="#1e293b"/>

  <!-- Upper arms (propped on forearms) -->
  <rect x="95" y="250" width="14" height="42" rx="7" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2" transform="rotate(-15 102 270)"/>
  <rect x="120" y="255" width="14" height="38" rx="7" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2" transform="rotate(10 127 270)"/>

  <!-- Torso (prone) -->
  <ellipse cx="200" cy="270" rx="75" ry="22" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2"/>

  <!-- Hips -->
  <ellipse cx="280" cy="275" rx="22" ry="18" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2"/>

  <!-- Left leg - pulling knee to chest -->
  <g>
    <!-- Thigh -->
    <rect x="285" y="240" width="16" height="45" rx="8" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="5 293 278;-50 293 278;5 293 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Lower leg (bent) -->
    <rect x="280" y="210" width="14" height="35" rx="7" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="5 293 278;-50 293 278;5 293 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="287" cy="210" rx="8" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="5 293 278;-50 293 278;5 293 278" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Right leg - opposite timing -->
  <g>
    <rect x="305" y="240" width="16" height="45" rx="8" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-50 313 278;5 313 278;-50 313 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="300" y="210" width="14" height="35" rx="7" fill="url(#bodyPC)" stroke="#b45309" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-50 313 278;5 313 278;-50 313 278" dur="2s" repeatCount="indefinite"/>
    </rect>
    <ellipse cx="307" cy="210" rx="8" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-50 313 278;5 313 278;-50 313 278" dur="2s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Arrow -->
  <path d="M 260 180 Q 240 160 220 180" stroke="#22d3ee" stroke-width="3" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="345" font-family="system-ui" font-size="14" fill="#94a3b8" text-anchor="middle">Knie abwechselnd zur Brust ziehen</text>
</svg>