<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgPCr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyPCr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgPCr)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Bauchlage-Crunch</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="280" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: prone (face down), head left, legs right -->

  <!-- Torso (lying face down on mat) -->
  <ellipse cx="170" cy="265" rx="60" ry="18" fill="url(#bodyPCr)" stroke="#b45309" stroke-width="2"/>

  <!-- Head (face down, propped up) -->
  <circle cx="95" cy="248" r="22" fill="url(#bodyPCr)" stroke="#b45309" stroke-width="2"/>
  <!-- Face -->
  <circle cx="86" cy="244" r="3" fill="#1e293b"/>
  <circle cx="98" cy="244" r="3" fill="#1e293b"/>
  <path d="M86 256 Q92 260 98 256" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Forearm prop -->
  <line x1="130" y1="260" x2="105" y2="278" stroke="url(#bodyPCr)" stroke-width="10" stroke-linecap="round"/>
  <line x1="105" y1="278" x2="88" y2="272" stroke="url(#bodyPCr)" stroke-width="10" stroke-linecap="round"/>

  <!-- Hips on mat -->
  <ellipse cx="240" cy="270" rx="22" ry="14" fill="url(#bodyPCr)" stroke="#b45309" stroke-width="2"/>

  <!-- Left thigh (pulling knee to chest - alternating) -->
  <line x1="258" y1="272" x2="295" y2="250" stroke="url(#bodyPCr)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="295;260;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="250;235;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left shin (bending toward chest) -->
  <line x1="295" y1="250" x2="315" y2="270" stroke="url(#bodyPCr)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="295;260;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="250;235;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="315;265;315" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="270;260;270" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left foot -->
  <ellipse cx="320" cy="268" rx="12" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cx" values="320;268;320" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="cy" values="268;258;268" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Right thigh (opposite timing) -->
  <line x1="255" y1="275" x2="260" y2="250" stroke="url(#bodyPCr)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x2" values="305;260;305" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="255;240;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right shin -->
  <line x1="305" y1="255" x2="340" y2="272" stroke="url(#bodyPCr)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="305;260;305" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="255;240;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="340;268;340" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="272;265;272" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Arrow showing knee-to-chest movement -->
  <g opacity="0.7">
    <path d="M280 195 Q255 185 240 200" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M246 194 L237 203 L248 206" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Knie abwechselnd zur Brust ziehen</text>
</svg>