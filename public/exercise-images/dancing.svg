<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgDance" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyDance" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgDance)"/>
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Tanzen</text>
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Music notes -->
  <text x="85" y="100" font-family="system-ui,sans-serif" font-size="24" fill="#22d3ee" opacity="0.7">
    <animate attributeName="y" values="100;85;100" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
  </text>
  <text x="310" y="110" font-family="system-ui,sans-serif" font-size="20" fill="#a78bfa" opacity="0.6">
    <animate attributeName="y" values="110;95;110" dur="1.8s" begin="0.4s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </text>

  <!-- Left leg -->
  <line x1="185" y1="255" x2="165" y2="310" stroke="url(#bodyDance)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x2" values="165;150;165" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="165" y1="310" x2="160" y2="342" stroke="url(#bodyDance)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="165;150;165" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="160;145;160" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <ellipse cx="160" cy="346" rx="15" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cx" values="160;145;160" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <!-- Right leg -->
  <line x1="215" y1="255" x2="235" y2="310" stroke="url(#bodyDance)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x2" values="235;250;235" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="235" y1="310" x2="240" y2="342" stroke="url(#bodyDance)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x1" values="235;250;235" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="240;255;240" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <ellipse cx="240" cy="346" rx="15" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5">
    <animate attributeName="cx" values="240;255;240" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Torso -->
  <ellipse cx="200" cy="205" rx="35" ry="50" fill="url(#bodyDance)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cx" values="200;210;200" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <!-- Head -->
  <circle cx="200" cy="132" r="24" fill="url(#bodyDance)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cx" values="200;210;200" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="192" cy="128" r="3" fill="#1e293b">
    <animate attributeName="cx" values="192;202;192" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="128" r="3" fill="#1e293b">
    <animate attributeName="cx" values="208;218;208" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M192 142 Q200 149 208 142" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M192 142 Q200 149 208 142;M202 142 Q210 149 218 142;M192 142 Q200 149 208 142" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Left arm -->
  <line x1="168" y1="180" x2="120" y2="140" stroke="url(#bodyDance)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="120;135;120" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="140;125;140" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="120" y1="140" x2="105" y2="110" stroke="url(#bodyDance)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="120;135;120" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="140;125;140" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="105;120;105" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right arm -->
  <line x1="232" y1="180" x2="280" y2="140" stroke="url(#bodyDance)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="280;265;280" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="140;125;140" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="280" y1="140" x2="295" y2="110" stroke="url(#bodyDance)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="280;265;280" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="140;125;140" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="295;280;295" dur="1.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Frei tanzen und bewegen, viel Spass dabei!</text>
</svg>