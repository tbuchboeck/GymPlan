<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgAC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyAC" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgAC)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Abdominal Crunch</text>

  <!-- Machine base -->
  <rect x="90" y="310" width="220" height="12" rx="5" fill="#475569"/>
  <!-- Machine back support -->
  <rect x="250" y="140" width="22" height="170" rx="8" fill="#475569"/>

  <!-- Machine arm (upper handle piece, pivoting) -->
  <line x1="260" y1="145" x2="130" y2="130" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y2" values="130;160;130" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Handle grips -->
  <line x1="130" y1="115" x2="130" y2="145" stroke="#64748b" stroke-width="8" stroke-linecap="round">
    <animate attributeName="y1" values="115;145;115" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="145;175;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Seat -->
  <rect x="150" y="275" width="80" height="15" rx="6" fill="#475569"/>
  <!-- Seat support -->
  <rect x="180" y="290" width="20" height="20" rx="4" fill="#475569"/>

  <!-- Ground line -->
  <line x1="50" y1="350" x2="350" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs (seated, fixed) -->
  <!-- Left thigh -->
  <line x1="175" y1="278" x2="145" y2="310" stroke="url(#bodyAC)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="145" y1="310" x2="148" y2="345" stroke="url(#bodyAC)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="148" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right thigh -->
  <line x1="225" y1="278" x2="255" y2="310" stroke="url(#bodyAC)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="255" y1="310" x2="252" y2="345" stroke="url(#bodyAC)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="252" cy="346" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Torso (crunching forward) -->
  <ellipse cx="200" cy="215" rx="35" ry="55" fill="url(#bodyAC)" stroke="#b45309" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="0 200 270;15 200 270;0 200 270" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Left upper arm (reaching to handles) -->
  <line x1="175" y1="185" x2="145" y2="155" stroke="url(#bodyAC)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="145" y1="155" x2="130" y2="135" stroke="url(#bodyAC)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="135;160;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right upper arm -->
  <line x1="225" y1="185" x2="255" y2="155" stroke="url(#bodyAC)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="255" y1="155" x2="260" y2="135" stroke="url(#bodyAC)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;175;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="135;160;135" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="200" cy="145" r="24" fill="url(#bodyAC)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cy" values="145;165;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="192" cy="141" r="3" fill="#1e293b">
    <animate attributeName="cy" values="141;161;141" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="141" r="3" fill="#1e293b">
    <animate attributeName="cy" values="141;161;141" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M191 151 Q200 157 209 151" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M191 151 Q200 157 209 151;M191 171 Q200 177 209 171;M191 151 Q200 157 209 151" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Crunch arrow -->
  <path d="M75 170 Q55 200 75 230" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M75 230 L70 220 M75 230 L85 225" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Oberkörper kontrolliert nach vorne beugen</text>
</svg>