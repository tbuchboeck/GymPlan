<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSU" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodySU" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgSU)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Sit-Ups</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="290" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: head left, feet right -->

  <!-- Foot on mat -->
  <ellipse cx="315" cy="296" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Shin -->
  <line x1="315" y1="290" x2="290" y2="238" stroke="url(#bodySU)" stroke-width="14" stroke-linecap="round"/>

  <!-- Thigh -->
  <line x1="290" y1="238" x2="220" y2="275" stroke="url(#bodySU)" stroke-width="16" stroke-linecap="round"/>

  <!-- Animated upper body group: full sit-up rotation around hip -->
  <g>
    <animateTransform attributeName="transform" type="rotate" values="-10 220 275;55 220 275;-10 220 275" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>

    <!-- Torso -->
    <ellipse cx="170" cy="268" rx="42" ry="24" fill="url(#bodySU)" stroke="#b45309" stroke-width="2"/>

    <!-- Upper arm (behind head) -->
    <line x1="150" y1="256" x2="128" y2="235" stroke="url(#bodySU)" stroke-width="10" stroke-linecap="round"/>
    <!-- Forearm -->
    <line x1="128" y1="235" x2="120" y2="215" stroke="url(#bodySU)" stroke-width="10" stroke-linecap="round"/>

    <!-- Head -->
    <circle cx="130" cy="240" r="24" fill="url(#bodySU)" stroke="#b45309" stroke-width="2"/>

    <!-- Face -->
    <circle cx="122" cy="236" r="3" fill="#1e293b"/>
    <circle cx="136" cy="236" r="3" fill="#1e293b"/>
    <path d="M121 248 Q130 254 139 248" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Arrow showing full sit-up arc -->
  <g opacity="0.7">
    <path d="M80 200 Q100 130 150 120" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M144 126 L155 115 L152 130" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Kontrolliert aufrichten, Nacken entspannt</text>
</svg>