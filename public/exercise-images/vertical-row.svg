<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgVR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyVR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgVR)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Vertical Row</text>

  <!-- Machine frame -->
  <rect x="280" y="80" width="22" height="220" rx="5" fill="#475569"/>
  <rect x="270" y="70" width="42" height="18" rx="5" fill="#64748b"/>

  <!-- Upper pulley -->
  <circle cx="291" cy="110" r="12" fill="#64748b" stroke="#334155" stroke-width="2"/>
  <circle cx="291" cy="110" r="5" fill="#334155"/>

  <!-- Weight stack -->
  <rect x="285" y="180" width="25" height="80" rx="3" fill="#64748b" stroke="#334155" stroke-width="1.5">
    <animate attributeName="y" values="180;160;180" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Cable -->
  <line x1="291" y1="110" x2="210" y2="155" stroke="#94a3b8" stroke-width="3">
    <animate attributeName="x2" values="210;160;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Handle -->
  <rect x="203" y="148" width="12" height="20" rx="4" fill="#64748b">
    <animate attributeName="x" values="203;153;203" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Chest pad -->
  <rect x="195" y="130" width="12" height="80" rx="5" fill="#64748b" stroke="#475569" stroke-width="1.5"/>

  <!-- Seat -->
  <rect x="90" y="260" width="80" height="15" rx="6" fill="#475569"/>
  <rect x="120" y="275" width="20" height="35" rx="4" fill="#475569"/>
  <rect x="95" y="310" width="65" height="8" rx="4" fill="#64748b"/>

  <!-- Foot bar -->
  <rect x="80" y="340" width="55" height="8" rx="3" fill="#475569"/>

  <!-- Ground line -->
  <line x1="50" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs -->
  <!-- Left thigh -->
  <line x1="135" y1="260" x2="110" y2="310" stroke="url(#bodyVR)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="110" y1="310" x2="100" y2="340" stroke="url(#bodyVR)" stroke-width="12" stroke-linecap="round"/>

  <!-- Right thigh -->
  <line x1="155" y1="260" x2="140" y2="310" stroke="url(#bodyVR)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="140" y1="310" x2="130" y2="340" stroke="url(#bodyVR)" stroke-width="12" stroke-linecap="round"/>

  <!-- Torso (leaning into chest pad) -->
  <ellipse cx="155" cy="195" rx="35" ry="55" fill="url(#bodyVR)" stroke="#0891b2" stroke-width="2"/>

  <!-- Left upper arm (pulling back) -->
  <line x1="178" y1="170" x2="210" y2="150" stroke="url(#bodyVR)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="210;175;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="210" y1="150" x2="210" y2="155" stroke="url(#bodyVR)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="210;175;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="210;160;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right upper arm -->
  <line x1="178" y1="195" x2="210" y2="175" stroke="url(#bodyVR)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="210;175;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="210" y1="175" x2="210" y2="165" stroke="url(#bodyVR)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="210;175;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="210;160;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="155" cy="118" r="24" fill="url(#bodyVR)" stroke="#0891b2" stroke-width="2"/>
  <!-- Face -->
  <circle cx="147" cy="114" r="3" fill="#1e293b"/>
  <circle cx="163" cy="114" r="3" fill="#1e293b"/>
  <path d="M146 124 Q155 130 164 124" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Pull arrow -->
  <path d="M250 330 L210 330" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M216 325 L206 330 L216 335" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Griff von oben zum Körper ziehen</text>
</svg>