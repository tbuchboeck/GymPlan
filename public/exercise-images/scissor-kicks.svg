<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodySK" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgSK)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Scissor Kicks</text>

  <!-- Mat -->
  <rect x="40" y="290" width="320" height="10" rx="5" fill="#475569"/>

  <!-- Head facing forward -->
  <circle cx="100" cy="232" r="22" fill="url(#bodySK)" stroke="#b45309" stroke-width="2"/>
  <circle cx="90" cy="228" r="3" fill="#1e293b"/>

  <!-- Upper arms (propped on forearms) -->
  <rect x="95" y="252" width="14" height="40" rx="7" fill="url(#bodySK)" stroke="#b45309" stroke-width="2" transform="rotate(-15 102 270)"/>
  <rect x="118" y="256" width="14" height="36" rx="7" fill="url(#bodySK)" stroke="#b45309" stroke-width="2" transform="rotate(10 125 270)"/>

  <!-- Torso (prone, slightly elevated) -->
  <ellipse cx="200" cy="272" rx="75" ry="20" fill="url(#bodySK)" stroke="#b45309" stroke-width="2"/>

  <!-- Hips -->
  <ellipse cx="280" cy="275" rx="22" ry="18" fill="url(#bodySK)" stroke="#b45309" stroke-width="2"/>

  <!-- Left leg - scissor up -->
  <rect x="290" y="220" width="15" height="60" rx="7" fill="url(#bodySK)" stroke="#b45309" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="-20 297 280;10 297 280;-20 297 280" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <ellipse cx="297" cy="220" rx="9" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="-20 297 280;10 297 280;-20 297 280" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Right leg - scissor down (opposite timing) -->
  <rect x="305" y="220" width="15" height="60" rx="7" fill="url(#bodySK)" stroke="#b45309" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="10 312 280;-20 312 280;10 312 280" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <ellipse cx="312" cy="220" rx="9" ry="7" fill="#c2410c" stroke="#7c2d12" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" values="10 312 280;-20 312 280;10 312 280" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Scissors motion arrows -->
  <path d="M 335 190 L 340 170 M 335 240 L 340 260" stroke="#22d3ee" stroke-width="2.5" fill="none">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </path>

  <!-- Info text -->
  <text x="200" y="345" font-family="system-ui" font-size="14" fill="#94a3b8" text-anchor="middle">Beine abwechselnd auf und ab bewegen</text>
</svg>