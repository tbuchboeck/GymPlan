<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgHH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyHH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgHH)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Hollow Hold</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="290" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view: person in hollow hold, arms extended overhead, legs extended low -->

  <!-- Lower back contact point on mat -->
  <ellipse cx="200" cy="282" rx="30" ry="10" fill="url(#bodyHH)" stroke="#991b1b" stroke-width="2"/>

  <!-- Torso (angled up from lower back) -->
  <ellipse cx="165" cy="258" rx="42" ry="24" fill="url(#bodyHH)" stroke="#991b1b" stroke-width="2">
    <animate attributeName="cy" values="258;256;258" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Upper arm (extended overhead, past head) -->
  <line x1="140" y1="248" x2="100" y2="225" stroke="url(#bodyHH)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y2" values="225;222;225" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line x1="100" y1="225" x2="65" y2="215" stroke="url(#bodyHH)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="225;222;225" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="215;212;215" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head (raised, between arms) -->
  <circle cx="120" cy="235" r="22" fill="url(#bodyHH)" stroke="#991b1b" stroke-width="2">
    <animate attributeName="cy" values="235;233;235" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="113" cy="231" r="3" fill="#1e293b">
    <animate attributeName="cy" values="231;229;231" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="127" cy="231" r="3" fill="#1e293b">
    <animate attributeName="cy" values="231;229;231" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M113 243 Q120 248 127 243" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M113 243 Q120 248 127 243;M113 241 Q120 246 127 241;M113 243 Q120 248 127 243" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Thigh (angled slightly down from hips) -->
  <line x1="225" y1="278" x2="278" y2="260" stroke="url(#bodyHH)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y2" values="260;258;260" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Shin -->
  <line x1="278" y1="260" x2="335" y2="252" stroke="url(#bodyHH)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y1" values="260;258;260" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="252;250;252" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Foot -->
  <ellipse cx="340" cy="248" rx="14" ry="6" fill="#dc2626" stroke="#991b1b" stroke-width="1.5">
    <animate attributeName="cy" values="248;246;248" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Hollow body curve indicator -->
  <path d="M65 220 Q200 300 340 253" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,5" fill="none" opacity="0.5">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- HOLD text -->
  <text x="200" y="330" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" text-anchor="middle">
    HALTEN
    <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Körperspannung halten, Rücken am Boden</text>
</svg>