<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyCr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgCr)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Crunch</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="290" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Side view, head on left, feet on right -->

  <!-- Right foot (flat on mat) -->
  <ellipse cx="310" cy="296" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right shin (vertical, foot on ground) -->
  <line x1="310" y1="290" x2="290" y2="240" stroke="url(#bodyCr)" stroke-width="14" stroke-linecap="round"/>

  <!-- Right thigh (knee bent, hip on mat) -->
  <line x1="290" y1="240" x2="220" y2="275" stroke="url(#bodyCr)" stroke-width="16" stroke-linecap="round"/>

  <!-- Torso (crunching up from hips) -->
  <ellipse cx="180" cy="255" rx="45" ry="28" fill="url(#bodyCr)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cy" values="255;235;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="ry" values="28;22;28" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Upper arm (behind head) -->
  <line x1="155" y1="230" x2="130" y2="210" stroke="url(#bodyCr)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="230;210;230" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="210;190;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm (behind head) -->
  <line x1="130" y1="210" x2="120" y2="185" stroke="url(#bodyCr)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="210;190;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="185;170;185" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="125" cy="210" r="24" fill="url(#bodyCr)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cy" values="210;190;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Face -->
  <circle cx="117" cy="206" r="3" fill="#1e293b">
    <animate attributeName="cy" values="206;186;206" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="131" cy="206" r="3" fill="#1e293b">
    <animate attributeName="cy" values="206;186;206" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M116 218 Q125 224 134 218" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M116 218 Q125 224 134 218;M116 198 Q125 204 134 198;M116 218 Q125 224 134 218" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Arrow showing upward curl -->
  <g opacity="0.7">
    <path d="M85 170 L85 135" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M79 142 L85 130 L91 142" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Oberkörper kontrolliert aufrollen</text>
</svg>