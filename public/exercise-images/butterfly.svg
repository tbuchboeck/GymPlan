<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBF" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBF)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Butterfly</text>

  <!-- Machine frame base -->
  <rect x="170" y="280" width="60" height="60" rx="5" fill="#475569"/>
  <rect x="155" y="340" width="90" height="8" rx="4" fill="#64748b"/>

  <!-- Seat -->
  <rect x="160" y="245" width="80" height="18" rx="8" fill="#475569"/>

  <!-- Back support -->
  <rect x="185" y="120" width="30" height="130" rx="10" fill="#475569"/>

  <!-- Machine pads (left, moving) -->
  <line x1="165" y1="140" x2="110" y2="140" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="110;165;110" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="110" y1="140" x2="110" y2="210" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="110;165;110" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="110;165;110" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Machine pads (right, moving) -->
  <line x1="235" y1="140" x2="290" y2="140" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="290;235;290" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="290" y1="140" x2="290" y2="210" stroke="#64748b" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="290;235;290" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="290;235;290" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs (seated) -->
  <!-- Left thigh -->
  <line x1="180" y1="250" x2="150" y2="310" stroke="url(#bodyBF)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="150" y1="310" x2="155" y2="345" stroke="url(#bodyBF)" stroke-width="12" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="155" cy="346" rx="16" ry="6" fill="#ec4899" stroke="#be185d" stroke-width="1.5"/>

  <!-- Right thigh -->
  <line x1="220" y1="250" x2="250" y2="310" stroke="url(#bodyBF)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="250" y1="310" x2="245" y2="345" stroke="url(#bodyBF)" stroke-width="12" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="245" cy="346" rx="16" ry="6" fill="#ec4899" stroke="#be185d" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="190" rx="38" ry="55" fill="url(#bodyBF)" stroke="#86198f" stroke-width="2"/>

  <!-- Left upper arm -->
  <line x1="168" y1="165" x2="120" y2="170" stroke="url(#bodyBF)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="120;168;120" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="120" y1="170" x2="115" y2="210" stroke="url(#bodyBF)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="120;168;120" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="115;168;115" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right upper arm -->
  <line x1="232" y1="165" x2="280" y2="170" stroke="url(#bodyBF)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="x2" values="280;232;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="280" y1="170" x2="285" y2="210" stroke="url(#bodyBF)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="280;232;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="285;232;285" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="200" cy="110" r="24" fill="url(#bodyBF)" stroke="#86198f" stroke-width="2"/>

  <!-- Face -->
  <circle cx="192" cy="106" r="3" fill="#1e293b"/>
  <circle cx="208" cy="106" r="3" fill="#1e293b"/>
  <path d="M191 116 Q200 122 209 116" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme kontrolliert zusammenführen</text>
</svg>