<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLunge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyLunge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgLunge)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Knie Schritt</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Head -->
  <circle cx="200" cy="92" r="24" fill="url(#bodyLunge)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="92;120;92" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="192" cy="88" r="3" fill="#1e293b">
    <animate attributeName="cy" values="88;116;88" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="88" r="3" fill="#1e293b">
    <animate attributeName="cy" values="88;116;88" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M192 100 Q200 106 208 100" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M192 100 Q200 106 208 100;M192 128 Q200 134 208 128;M192 100 Q200 106 208 100" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Torso -->
  <ellipse cx="200" cy="170" rx="36" ry="48" fill="url(#bodyLunge)" stroke="#be185d" stroke-width="2">
    <animate attributeName="cy" values="170;198;170" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Arms at hips -->
  <!-- Left upper arm -->
  <line x1="168" y1="155" x2="150" y2="185" stroke="url(#bodyLunge)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;183;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="185;213;185" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="150" y1="185" x2="155" y2="210" stroke="url(#bodyLunge)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="y1" values="185;213;185" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="210;238;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right upper arm -->
  <line x1="232" y1="155" x2="250" y2="185" stroke="url(#bodyLunge)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="155;183;155" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="185;213;185" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="250" y1="185" x2="245" y2="210" stroke="url(#bodyLunge)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="y1" values="185;213;185" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="210;238;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Front leg (left) - thigh -->
  <line x1="185" y1="215" x2="150" y2="280" stroke="url(#bodyLunge)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y1" values="215;243;215" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="150;140;150" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Front leg - shin -->
  <line x1="150" y1="280" x2="145" y2="342" stroke="url(#bodyLunge)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="150;140;150" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="145;130;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Front foot -->
  <ellipse cx="145" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5">
    <animate attributeName="cx" values="145;130;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Back leg (right) - thigh -->
  <line x1="215" y1="215" x2="260" y2="280" stroke="url(#bodyLunge)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="y1" values="215;243;215" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="260;270;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="280;310;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Back leg - shin -->
  <line x1="260" y1="280" x2="265" y2="342" stroke="url(#bodyLunge)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="260;270;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="280;310;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="265;280;265" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Back foot -->
  <ellipse cx="265" cy="346" rx="16" ry="6" fill="#db2777" stroke="#be185d" stroke-width="1.5">
    <animate attributeName="cx" values="265;280;265" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Ausfallschritte, abwechselnd links und rechts</text>
</svg>