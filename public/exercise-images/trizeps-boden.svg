<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgTB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyTB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgTB)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Trizeps Boden</text>

  <!-- Ground / Mat -->
  <rect x="40" y="320" width="320" height="8" rx="4" fill="#475569"/>
  <line x1="40" y1="328" x2="360" y2="328" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Side view: person doing floor tricep dips -->

  <!-- Feet (fixed on ground) -->
  <ellipse cx="310" cy="318" rx="16" ry="6" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Right shin (from foot to knee, angled) -->
  <line x1="310" y1="315" x2="275" y2="275" stroke="url(#bodyTB)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y2" values="275;290;275" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right thigh (from knee up to hip) -->
  <line x1="275" y1="275" x2="220" y2="250" stroke="url(#bodyTB)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="275;275;275" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="275;290;275" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="250;270;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Torso (from hip to shoulder, roughly vertical) -->
  <ellipse cx="200" cy="210" rx="30" ry="45" fill="url(#bodyTB)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cy" values="210;230;210" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Hands on ground (behind body, fixed) -->
  <ellipse cx="120" cy="318" rx="10" ry="5" fill="#d97706" stroke="#b45309" stroke-width="1.5"/>

  <!-- Left upper arm (shoulder to elbow, animated bend) -->
  <line x1="170" y1="195" x2="140" y2="260" stroke="url(#bodyTB)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y1" values="195;215;195" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="260;285;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm (elbow to hand on ground) -->
  <line x1="140" y1="260" x2="120" y2="315" stroke="url(#bodyTB)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="y1" values="260;285;260" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head (side view) -->
  <circle cx="195" cy="150" r="24" fill="url(#bodyTB)" stroke="#b45309" stroke-width="2">
    <animate attributeName="cy" values="150;170;150" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face (side view: one eye + smile) -->
  <circle cx="184" cy="146" r="3" fill="#1e293b">
    <animate attributeName="cy" values="146;166;146" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M182 158 Q189 164 196 158" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M182 158 Q189 164 196 158;M182 178 Q189 184 196 178;M182 158 Q189 164 196 158" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Movement arrow (down/up) -->
  <g opacity="0.6">
    <line x1="230" y1="150" x2="230" y2="180" stroke="#22d3ee" stroke-width="2" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </line>
    <path d="M225 174 L230 184 L235 174" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="370" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Hände hinter dem Körper, Arme beugen und strecken</text>
</svg>