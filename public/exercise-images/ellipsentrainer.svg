<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgET" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyET" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgET)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Ellipsentrainer</text>

  <!-- Machine base -->
  <rect x="80" y="335" width="240" height="8" rx="4" fill="#475569"/>
  <rect x="195" y="250" width="10" height="90" rx="3" fill="#64748b"/>
  <rect x="197" y="100" width="6" height="160" rx="3" fill="#64748b"/>
  <rect x="185" y="90" width="30" height="18" rx="4" fill="#475569"/>

  <!-- Handle bars -->
  <line x1="145" y1="120" x2="145" y2="220" stroke="#64748b" stroke-width="6" stroke-linecap="round">
    <animate attributeName="x1" values="145;140;145;150;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="145;140;145;150;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="255" y1="120" x2="255" y2="220" stroke="#64748b" stroke-width="6" stroke-linecap="round">
    <animate attributeName="x1" values="255;260;255;250;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="255;260;255;250;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Pedals -->
  <ellipse cx="145" cy="325" rx="28" ry="8" fill="#475569" stroke="#334155" stroke-width="1.5">
    <animate attributeName="cy" values="325;315;325;335;325" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>
  <ellipse cx="255" cy="325" rx="28" ry="8" fill="#475569" stroke="#334155" stroke-width="1.5">
    <animate attributeName="cy" values="325;335;325;315;325" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Ground line -->
  <line x1="50" y1="350" x2="350" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leg -->
  <line x1="180" y1="230" x2="148" y2="280" stroke="url(#bodyET)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y2" values="280;270;280;290;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="148" y1="280" x2="145" y2="320" stroke="url(#bodyET)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y1" values="280;270;280;290;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="320;310;320;330;320" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right leg -->
  <line x1="220" y1="230" x2="252" y2="280" stroke="url(#bodyET)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="y2" values="280;290;280;270;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="252" y1="280" x2="255" y2="320" stroke="url(#bodyET)" stroke-width="12" stroke-linecap="round">
    <animate attributeName="y1" values="280;290;280;270;280" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="320;330;320;310;320" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Torso -->
  <ellipse cx="200" cy="180" rx="38" ry="55" fill="url(#bodyET)" stroke="#0e7490" stroke-width="2"/>

  <!-- Arms -->
  <line x1="170" y1="150" x2="145" y2="160" stroke="url(#bodyET)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="145;140;145;150;145" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <line x1="230" y1="150" x2="255" y2="160" stroke="url(#bodyET)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="255;260;255;250;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Head -->
  <circle cx="200" cy="105" r="24" fill="url(#bodyET)" stroke="#0e7490" stroke-width="2"/>
  <circle cx="192" cy="101" r="3" fill="#1e293b"/>
  <circle cx="208" cy="101" r="3" fill="#1e293b"/>
  <path d="M191 111 Q200 117 209 111" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Gleichmäßige Ganzkörperbewegung</text>
</svg>