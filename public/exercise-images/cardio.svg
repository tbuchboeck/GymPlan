<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgCardio" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyCardio" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgCardio)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Ausdauertraining</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Running figure - jumping jacks style -->

  <!-- Left leg - thigh -->
  <line x1="185" y1="240" x2="140" y2="295" stroke="url(#bodyCardio)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="140;170;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left leg - shin -->
  <line x1="140" y1="295" x2="130" y2="342" stroke="url(#bodyCardio)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="140;170;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="130;165;130" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left foot -->
  <ellipse cx="130" cy="346" rx="16" ry="6" fill="#0891b2" stroke="#0e7490" stroke-width="1.5">
    <animate attributeName="cx" values="130;165;130" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Right leg - thigh -->
  <line x1="215" y1="240" x2="260" y2="295" stroke="url(#bodyCardio)" stroke-width="16" stroke-linecap="round">
    <animate attributeName="x2" values="260;230;260" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right leg - shin -->
  <line x1="260" y1="295" x2="270" y2="342" stroke="url(#bodyCardio)" stroke-width="14" stroke-linecap="round">
    <animate attributeName="x1" values="260;230;260" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="270;235;270" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right foot -->
  <ellipse cx="270" cy="346" rx="16" ry="6" fill="#0891b2" stroke="#0e7490" stroke-width="1.5">
    <animate attributeName="cx" values="270;235;270" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Torso -->
  <ellipse cx="200" cy="185" rx="36" ry="52" fill="url(#bodyCardio)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cy" values="185;180;185" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Head -->
  <circle cx="200" cy="108" r="24" fill="url(#bodyCardio)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cy" values="108;103;108" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <!-- Face -->
  <circle cx="192" cy="104" r="3" fill="#1e293b">
    <animate attributeName="cy" values="104;99;104" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="208" cy="104" r="3" fill="#1e293b">
    <animate attributeName="cy" values="104;99;104" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M192 116 Q200 122 208 116" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M192 116 Q200 122 208 116;M192 111 Q200 117 208 111;M192 116 Q200 122 208 116" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Left arm - upper (raising out) -->
  <line x1="166" y1="160" x2="120" y2="140" stroke="url(#bodyCardio)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="120;150;120" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="140;155;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Left forearm -->
  <line x1="120" y1="140" x2="95" y2="110" stroke="url(#bodyCardio)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="120;150;120" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="140;155;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="95;140;95" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="110;135;110" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right arm - upper (raising out) -->
  <line x1="234" y1="160" x2="280" y2="140" stroke="url(#bodyCardio)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="280;250;280" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="140;155;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Right forearm -->
  <line x1="280" y1="140" x2="305" y2="110" stroke="url(#bodyCardio)" stroke-width="9" stroke-linecap="round">
    <animate attributeName="x1" values="280;250;280" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="140;155;140" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="305;260;305" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="110;135;110" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Heart rate pulse indicator -->
  <circle cx="330" cy="80" r="6" fill="#ef4444" opacity="0.7">
    <animate attributeName="r" values="6;9;6" dur="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1s" repeatCount="indefinite"/>
  </circle>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Jumping Jacks - Arme und Beine gleichzeitig bewegen</text>
</svg>