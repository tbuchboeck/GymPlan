<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgSH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodySH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="dumbbellSH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="50%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgSH)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Seitheben</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Legs -->
  <!-- Left leg -->
  <line x1="188" y1="268" x2="180" y2="340" stroke="url(#bodySH)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="212" y1="268" x2="220" y2="340" stroke="url(#bodySH)" stroke-width="14" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="178" cy="346" rx="16" ry="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>
  <ellipse cx="222" cy="346" rx="16" ry="6" fill="#2563eb" stroke="#1d4ed8" stroke-width="1.5"/>

  <!-- Torso -->
  <ellipse cx="200" cy="200" rx="38" ry="60" fill="url(#bodySH)" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Left arm (lateral raise - rotates outward) -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 170 155;-75 170 155;0 170 155" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <!-- Upper arm -->
    <line x1="170" y1="155" x2="135" y2="195" stroke="url(#bodySH)" stroke-width="11" stroke-linecap="round"/>
    <!-- Forearm -->
    <line x1="135" y1="195" x2="108" y2="225" stroke="url(#bodySH)" stroke-width="9" stroke-linecap="round"/>
    <!-- Dumbbell -->
    <circle cx="108" cy="225" r="8" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- Right arm (lateral raise - rotates outward) -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 230 155;75 230 155;0 230 155" dur="2.5s" repeatCount="indefinite"
      calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <!-- Upper arm -->
    <line x1="230" y1="155" x2="265" y2="195" stroke="url(#bodySH)" stroke-width="11" stroke-linecap="round"/>
    <!-- Forearm -->
    <line x1="265" y1="195" x2="292" y2="225" stroke="url(#bodySH)" stroke-width="9" stroke-linecap="round"/>
    <!-- Dumbbell -->
    <circle cx="292" cy="225" r="8" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  </g>

  <!-- Head -->
  <circle cx="200" cy="118" r="26" fill="url(#bodySH)" stroke="#1d4ed8" stroke-width="2"/>

  <!-- Face details -->
  <circle cx="192" cy="114" r="3" fill="#1e293b"/>
  <circle cx="208" cy="114" r="3" fill="#1e293b"/>
  <path d="M190 126 Q200 132 210 126" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Lift direction arrows -->
  <g opacity="0.7">
    <path d="M72 195 L72 165" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M67 172 L72 160 L77 172" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M328 195 L328 165" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M323 172 L328 160 L333 172" stroke="#fbbf24" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Arme seitlich bis Schulterhöhe heben, 2kg</text>
</svg>