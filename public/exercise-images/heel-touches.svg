<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgHT" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyHT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgHT)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Heel Touches</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Mat -->
  <rect x="60" y="280" width="280" height="10" rx="5" fill="#475569"/>

  <!-- Top-down view: person lying on back, knees bent, reaching side to side -->

  <!-- Torso (top-down, lying flat) -->
  <ellipse cx="200" cy="210" rx="32" ry="55" fill="url(#bodyHT)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cx" values="200;188;200;212;200" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </ellipse>

  <!-- Head (top-down) -->
  <circle cx="200" cy="138" r="22" fill="url(#bodyHT)" stroke="#0e7490" stroke-width="2">
    <animate attributeName="cx" values="200;188;200;212;200" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Face (top-down) -->
  <circle cx="193" cy="134" r="3" fill="#1e293b">
    <animate attributeName="cx" values="193;181;193;205;193" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <circle cx="207" cy="134" r="3" fill="#1e293b">
    <animate attributeName="cx" values="207;195;207;219;207" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>
  <path d="M194 145 Q200 150 206 145" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="d" values="M194 145 Q200 150 206 145;M182 145 Q188 150 194 145;M194 145 Q200 150 206 145;M206 145 Q212 150 218 145;M194 145 Q200 150 206 145" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </path>

  <!-- Left thigh -->
  <line x1="185" y1="260" x2="155" y2="295" stroke="url(#bodyHT)" stroke-width="16" stroke-linecap="round"/>
  <!-- Left shin -->
  <line x1="155" y1="295" x2="150" y2="265" stroke="url(#bodyHT)" stroke-width="14" stroke-linecap="round"/>
  <!-- Left foot -->
  <ellipse cx="148" cy="262" rx="10" ry="7" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>

  <!-- Right thigh -->
  <line x1="215" y1="260" x2="245" y2="295" stroke="url(#bodyHT)" stroke-width="16" stroke-linecap="round"/>
  <!-- Right shin -->
  <line x1="245" y1="295" x2="250" y2="265" stroke="url(#bodyHT)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right foot -->
  <ellipse cx="252" cy="262" rx="10" ry="7" fill="#0891b2" stroke="#0e7490" stroke-width="1.5"/>

  <!-- Left arm reaching down (animated) -->
  <line x1="175" y1="190" x2="140" y2="240" stroke="url(#bodyHT)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="140;130;140;140;140" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="240;260;240;240;240" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x1" values="175;163;175;187;175" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Right arm reaching down (animated) -->
  <line x1="225" y1="190" x2="260" y2="240" stroke="url(#bodyHT)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x2" values="260;260;260;270;260" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="240;240;240;260;240" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x1" values="225;213;225;237;225" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>

  <!-- Arrows showing side-to-side -->
  <g opacity="0.7">
    <path d="M100 310 L130 310" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;1;0.3;0.3;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M124 305 L134 310 L124 315" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;1;0.3;0.3;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M300 310 L270 310" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="opacity" values="0.3;0.3;0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M276 305 L266 310 L276 315" stroke="#fbbf24" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;0.3;0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Hände abwechselnd zu den Fersen führen</text>
</svg>