<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgBr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bodyBr" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="400" height="400" fill="url(#bgBr)"/>

  <!-- Title -->
  <text x="200" y="40" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Butterfly Reverse</text>

  <!-- Ground line -->
  <line x1="60" y1="350" x2="340" y2="350" stroke="#475569" stroke-width="2" stroke-linecap="round"/>

  <!-- Side view: person facing right, bent forward ~45 degrees -->

  <!-- Foot -->
  <ellipse cx="160" cy="346" rx="22" ry="6" fill="#ec4899" stroke="#be185d" stroke-width="1.5"/>

  <!-- Shin -->
  <line x1="162" y1="342" x2="168" y2="298" stroke="url(#bodyBr)" stroke-width="13" stroke-linecap="round"/>

  <!-- Thigh -->
  <line x1="168" y1="298" x2="185" y2="258" stroke="url(#bodyBr)" stroke-width="14" stroke-linecap="round"/>

  <!-- Torso (bent forward ~45 degrees, static) -->
  <ellipse cx="225" cy="220" rx="30" ry="50" fill="url(#bodyBr)" stroke="#be185d" stroke-width="2" transform="rotate(45 225 220)"/>

  <!-- Head (forward and down due to bend) -->
  <circle cx="268" cy="182" r="22" fill="url(#bodyBr)" stroke="#be185d" stroke-width="2"/>
  <!-- Eye -->
  <circle cx="276" cy="179" r="3" fill="#1e293b"/>
  <!-- Smile -->
  <path d="M272 190 Q276 194 280 190" stroke="#1e293b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Near arm (visible side): sweeps from hanging down to out/up -->
  <!-- Upper arm -->
  <line x1="240" y1="205" stroke="url(#bodyBr)" stroke-width="11" stroke-linecap="round">
    <animate attributeName="x2" values="235;225;235" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="250;195;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line stroke="url(#bodyBr)" stroke-width="10" stroke-linecap="round">
    <animate attributeName="x1" values="235;225;235" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="250;195;250" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="230;210;230" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="295;180;295" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Near dumbbell -->
  <rect width="6" height="14" rx="2" fill="#64748b" stroke="#475569" stroke-width="1">
    <animate attributeName="x" values="227;207;227" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="292;175;292" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Far arm (partially visible behind torso): sweeps from hanging down to out/back -->
  <!-- Upper arm -->
  <line x1="215" y1="210" stroke="url(#bodyBr)" stroke-width="10" stroke-linecap="round" opacity="0.6">
    <animate attributeName="x2" values="218;240;218" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="255;210;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Forearm -->
  <line stroke="url(#bodyBr)" stroke-width="9" stroke-linecap="round" opacity="0.6">
    <animate attributeName="x1" values="218;240;218" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y1" values="255;210;255" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="x2" values="222;260;222" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y2" values="300;198;300" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </line>
  <!-- Far dumbbell -->
  <rect width="6" height="14" rx="2" fill="#64748b" stroke="#475569" stroke-width="1" opacity="0.6">
    <animate attributeName="x" values="219;257;219" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="y" values="297;193;297" dur="2.5s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </rect>

  <!-- Motion arc indicators -->
  <path d="M230 295 Q200 240 210 180" stroke="#c084fc" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M222 300 Q250 250 260 198" stroke="#c084fc" stroke-width="1.5" fill="none" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Info text -->
  <text x="200" y="385" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">Vorgebeugt, Arme seitlich anheben</text>
</svg>